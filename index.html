<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CodeAI</title>

<style>
body {
margin: 0;
font-family: Arial;
background: #0b0f1a;
color: white;
}

header {
padding: 15px;
background: #111827;
display: flex;
justify-content: space-between;
align-items: center;
}

.container {
padding: 20px;
display: flex;
justify-content: center;
}

.card {
background: #111827;
padding: 25px;
border-radius: 12px;
max-width: 500px;
width: 100%;
box-shadow: 0 0 10px rgba(0,0,0,0.4);
}

button {
padding: 12px 16px;
border: none;
border-radius: 8px;
cursor: pointer;
background: #3b82f6;
color: white;
margin-top: 15px;
width: 100%;
font-size: 16px;
}

button:hover {
background: #2563eb;
}

.status {
margin-top: 12px;
color: #9ca3af;
font-size: 14px;
min-height: 20px;
}
</style>

</head>

<body>

<header>
<h2>CodeAI</h2>
<span>🚀 IA en línea</span>
</header>

<div class="container">

<div class="card">

<h2>💎 CodeAI Plus</h2>

<p>Acceso a funciones avanzadas y modelos experimentales</p>

<p><b>Precio:</b> 4.99$ / mes</p>

<button onclick="buyPlus()">Comprar ahora</button>

<div class="status" id="status"></div>

</div>

</div>

<script>
async function buyPlus() {
  const status = document.getElementById("status");
  status.innerText = "Conectando con servidor...";

  try {
    const res = await fetch("https://codeai-pgko.onrender.com/create-checkout-session", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      }
    });

    console.log("HTTP STATUS:", res.status);

    const text = await res.text();
    console.log("RAW RESPONSE:", text);

    let data;

    try {
      data = JSON.parse(text);
    } catch (e) {
      status.innerText = "Error: respuesta inválida del servidor";
      return;
    }

    if (res.ok && data.url) {
      status.innerText = "Redirigiendo a Stripe...";
      window.location.href = data.url;
    } else {
      status.innerText = data.error || "Error al crear sesión de pago";
    }

  } catch (err) {
    console.error(err);
    status.innerText = "Error de conexión con el servidor";
  }
}
</script>

</body>
</html>
