<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CodeAI</title>

  <link rel="stylesheet" href="style.css"/>

  <!-- 🔥 IMPORTANTE: defer evita errores como renderChat undefined -->
  <script src="script.js" defer></script>
</head>

<body>

  <div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <button onclick="newChat()">➕ Nuevo Chat</button>

      <div id="chatList"></div>

      <hr/>

      <!-- MODELOS -->
      <div class="models">

        <div class="model-card active" onclick="setModel('phoenix', this)">
          <h3>Phoenix 2.0</h3>
          <p>Roblox LuaU experto</p>
        </div>

        <div class="model-card" onclick="setModel('meta', this)">
          <h3>Meta 2.0</h3>
          <p>Python experto</p>
        </div>

      </div>

    </div>

    <!-- CHAT -->
    <div class="chat-container">

      <div id="chat" class="chat"></div>

      <div class="input-box">
        <input id="prompt" type="text" placeholder="Escribe un mensaje..." />
        <button onclick="send()">Enviar</button>
      </div>

    </div>

  </div>

</body>
</html>
